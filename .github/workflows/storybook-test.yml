name: Storybook Test

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/dds-desktop/src/**/*.spec.stories.tsx'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn workspace @dds/desktop playwright install --with-deps chromium

      - name: Build packages
        run: yarn build:packages

      - name: Build Storybook
        run: yarn workspace @dds/desktop build-storybook --quiet
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Serve Storybook and run tests
        run: |
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server packages/dds-desktop/storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && yarn workspace @dds/desktop test-storybook --url http://localhost:6006 --ci"
        env:
          CI: true
