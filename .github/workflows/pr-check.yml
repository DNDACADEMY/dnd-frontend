name: PR Check (services)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'services/**'
      - 'tools/**'
      - 'package.json'
      - 'yarn.lock'
      - 'turbo.json'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run type check
        run: yarn turbo check-types --filter='./services/*'

      - name: Run lint
        run: yarn turbo lint --filter='./services/*'

      - name: Build services
        run: yarn build:services
