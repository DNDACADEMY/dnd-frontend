pre-commit:
  parallel: true
  commands:
    lint:
      glob: '**/*.{js,ts,tsx,jsx}'
      run: yarn lint
    format:
      glob: '**/*.{js,ts,tsx,jsx,json,md}'
      run: yarn format
    type-check:
      glob: '**/*.{ts,tsx}'
      run: yarn check-types

pre-push:
  commands:
    format:
      run: yarn format
      priority: 1
    lint:
      run: yarn lint
      priority: 1
    build:
      run: yarn build
      priority: 1
    type-check:
      run: yarn check-types
      priority: 2
